<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | N2M</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1" style="width:100vw;height:100vh;"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="loading-text" style="text-align: center; color: white; margin-top: 10px;">Loading...</div>
      </div>
      <div id="unity-warning"></div>
      <div id="unity-footer">
        <div id="unity-logo-title-footer"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">N2M</div>
      </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px; color: white;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/N2M.loader.js";
      var config = {
        arguments: [],
        dataUrl:      buildUrl + "/N2M.data.unityweb"       + "?v=" + Date.now(),
        frameworkUrl: buildUrl + "/N2M.framework.js.unityweb" + "?v=" + Date.now(),
        codeUrl:      buildUrl + "/N2M.wasm.unityweb"        + "?v=" + Date.now(),
        streamingAssetsUrl: "StreamingAssets",
        companyName: "CZBLABS",
        productName: "N2M",
        productVersion: "0.0.1",
        showBanner: unityShowBanner,
        devicePixelRatio: Math.min(window.devicePixelRatio || 1, 2),
      };

      config.matchWebGLToCanvasSize = true;

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl + "?v=" + Date.now();
      script.onerror = function(error) {
        console.error('Failed to load Unity loader:', error);
        unityShowBanner('Failed to load game resources. Please try refreshing the page.', 'error');
      };

      script.onload = function() {
        var retryCount = 0;
        var maxRetries = 3;

        function initializeUnity() {
          if (retryCount >= maxRetries) {
            unityShowBanner('Failed to initialize game after multiple attempts. Please refresh the page.', 'error');
            return;
          }

          createUnityInstance(canvas, config, function(progress) {
            document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
            document.querySelector("#loading-text").textContent = "Loading... " + Math.round(progress * 100) + "%";
          }).then(function(unityInstance) {
            window.gameInstance = unityInstance;
            document.querySelector("#unity-loading-bar").style.display = "none";

            document.querySelector("#unity-fullscreen-button").onclick = function() {
              unityInstance.SetFullscreen(1);
            };

            canvas.addEventListener('webglcontextlost', function(e) {
              e.preventDefault();
              console.error('WebGL context lost. Reloading...');
              unityShowBanner('WebGL context lost. Reloading...', 'error');
              setTimeout(function() { window.location.reload(); }, 2000);
            }, false);

            canvas.addEventListener('webglcontextrestored', function() {
              console.log('WebGL context restored');
            }, false);

          }).catch(function(error) {
            console.error('Unity initialization failed:', error);
            retryCount++;
            setTimeout(initializeUnity, 1000);
          });
        }

        initializeUnity();
      };

      document.body.appendChild(script);

    </script>
  </body>
</html>
